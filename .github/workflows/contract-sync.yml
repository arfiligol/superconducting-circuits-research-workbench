name: Contract Sync Verification

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "scripts/sync_api_types.sh"
      - "scripts/verify_contract_sync.sh"
      - "openapi.json"
      - ".github/workflows/contract-sync.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "scripts/sync_api_types.sh"
      - "scripts/verify_contract_sync.sh"
      - "openapi.json"
      - ".github/workflows/contract-sync.yml"

jobs:
  verify-contract-sync:
    name: Verify Contract Sync
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: cd backend && uv sync

      - name: Verify Contract Sync
        run: ./scripts/verify_contract_sync.sh
