name: Docs Route Integrity

on:
  pull_request:
    paths:
      - "docs/**"
      - "site/**"
      - "scripts/build_docs_sites.sh"
      - "scripts/build/prepare_starlight_docs.py"
      - "scripts/check_docs_nav_routes.py"
      - "scripts/check_docs_app_quarantine.py"
      - "scripts/check_docs_language.py"
      - "scripts/check_docs_language_allowlist.txt"
      - ".github/workflows/docs-route-integrity.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "site/**"
      - "scripts/build_docs_sites.sh"
      - "scripts/build/prepare_starlight_docs.py"
      - "scripts/check_docs_nav_routes.py"
      - "scripts/check_docs_app_quarantine.py"
      - "scripts/check_docs_language.py"
      - "scripts/check_docs_language_allowlist.txt"
      - ".github/workflows/docs-route-integrity.yml"

jobs:
  docs-routes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: npm ci --prefix site

      - name: Validate docs source routes
        run: uv run python scripts/check_docs_nav_routes.py --check-source

      - name: Validate docs App quarantine
        run: uv run python scripts/check_docs_app_quarantine.py

      - name: Validate docs language
        run: uv run python scripts/check_docs_language.py

      - name: Build docs sites
        run: ./scripts/build_docs_sites.sh

      - name: Validate docs built routes
        run: uv run python scripts/check_docs_nav_routes.py --check-built
