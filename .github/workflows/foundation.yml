name: Foundation

on:
  pull_request:
    paths:
      - ".github/workflows/foundation.yml"
      - "package.json"
      - "README.md"
      - ".gitignore"
      - "scripts/*.sh"
      - "app/frontend/**"
      - "app/backend/**"
      - "app/desktop/**"
  push:
    paths:
      - ".github/workflows/foundation.yml"
      - "package.json"
      - "README.md"
      - ".gitignore"
      - "scripts/*.sh"
      - "app/frontend/**"
      - "app/backend/**"
      - "app/desktop/**"

jobs:
  foundation:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          mkdir -p .cache/npm/frontend .cache/npm/desktop
          npm install --prefix app/frontend --cache "$PWD/.cache/npm/frontend"
          (cd app/backend && uv sync)
          npm install --prefix app/desktop --cache "$PWD/.cache/npm/desktop"

      - name: Run checks
        run: |
          (cd app/backend && uv run pytest -q)
          npm run test --prefix app/frontend
          npm run lint --prefix app/desktop

      - name: Build workspaces
        run: |
          npm run build --prefix app/frontend
          npm run build --prefix app/desktop
